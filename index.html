<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col justify-between"
  >
    <header
      class="bg-white border-b border-gray-100 py-4 px-6 text-center shadow-sm"
    >
      <h1 class="text-3xl font-extrabold tracking-wide text-gray-900">
        Workout Tracker
      </h1>
      <div class="flex justify-center space-x-4 my-6">
        <button
          onclick="toggleDay(this)"
          class="day-tracker-btn px-5 py-2.5 text-lg rounded-full bg-blue-600 text-white font-semibold shadow-md transition-all"
        >
          MON
        </button>
        <button
          onclick="toggleDay(this)"
          class="day-tracker-btn px-5 py-2.5 text-lg rounded-full bg-gray-100 text-gray-700 font-semibold transition-all"
        >
          WED
        </button>
        <button
          onclick="toggleDay(this)"
          class="day-tracker-btn px-5 py-2.5 text-lg rounded-full bg-gray-100 text-gray-700 font-semibold transition-all"
        >
          FRI
        </button>
      </div>
    </header>

    <main class="flex-1 flex items-center justify-center p-4">
      <div
        id="exercise-card"
        class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex flex-col justify-between min-h-[520px]"
      >
        <div
          class="flex justify-center my-4 overflow-hidden rounded-lg h-40 bg-gray-50"
        >
          <video
            id="exercise-video"
            autoplay
            loop
            muted
            playsinline
            class="h-full w-auto rounded-lg mix-blend-multiply object-cover"
            src=""
          >
            Your browser does not support the video tag.
          </video>
        </div>

        <div class="p-6 flex-1 flex flex-col justify-between">
          <div>
            <div class="flex justify-between items-start mb-1">
              <h2
                id="exercise-name"
                class="text-2xl font-extrabold text-gray-900 leading-tight flex-1"
              >
                Exercise Name
              </h2>
              <span
                id="exercise-index"
                class="text-sm font-bold bg-gray-100 text-gray-500 px-2.5 py-1 rounded-full ml-2 whitespace-nowrap"
              >
                1 / 8
              </span>
            </div>

            <p
              id="exercise-eq"
              class="text-lg font-medium text-indigo-600 mb-4"
            >
              Equipment
            </p>

            <div
              class="bg-indigo-50/50 border border-indigo-100 rounded-xl p-4 mb-6"
            >
              <h3
                class="text-base font-bold uppercase tracking-wider text-indigo-800 mb-1"
              >
                Breathing & Form Guide
              </h3>
              <p
                id="exercise-cue"
                class="text-base text-gray-700 leading-relaxed"
              >
                Breathing instructions go here...
              </p>
            </div>
          </div>

          <div class="space-y-3">
            <h3
              id="sets-header"
              class="text-base font-bold uppercase tracking-wider text-gray-400 mb-1"
            >
              Today's Sets (3 x 10-12)
            </h3>
            <div class="grid grid-cols-3 gap-3">
              <button
                onclick="toggleSet(0)"
                id="set-0"
                class="py-3 rounded-xl border-2 border-gray-200 font-bold transition-all flex flex-col items-center justify-center gap-1 bg-white text-gray-500"
              >
                <span class="text-base font-medium">SET 1</span>
                <span class="text-lg" id="check-0">⬜</span>
              </button>
              <button
                onclick="toggleSet(1)"
                id="set-1"
                class="py-3 rounded-xl border-2 border-gray-200 font-bold transition-all flex flex-col items-center justify-center gap-1 bg-white text-gray-500"
              >
                <span class="text-base font-medium">SET 2</span>
                <span class="text-lg" id="check-1">⬜</span>
              </button>
              <button
                onclick="toggleSet(2)"
                id="set-2"
                class="py-3 rounded-xl border-2 border-gray-200 font-bold transition-all flex flex-col items-center justify-center gap-1 bg-white text-gray-500"
              >
                <span class="text-base font-medium">SET 3</span>
                <span class="text-lg" id="check-2">⬜</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="p-4 max-w-md w-full mx-auto flex gap-4">
      <button
        onclick="prevExercise()"
        class="flex-1 py-4 bg-gray-200 hover:bg-gray-300 font-bold rounded-xl transition-colors text-gray-700 text-center text-lg"
      >
        Previous
      </button>
      <button
        onclick="nextExercise()"
        class="flex-1 py-4 bg-indigo-600 hover:bg-indigo-700 font-bold rounded-xl transition-colors text-white text-center text-lg shadow-md shadow-indigo-200"
      >
        Next Move
      </button>
    </footer>

    <script>
      const exercises = [
        {
          name: "Incline Dumbbell Press",
          equipment: "5 lb Weights + Adjustable Bench",
          cue: "Exhale sharply as you push the dumbbells up away from your chest. Inhale slowly as you control them back down.",
          reps: "3 x 10-12 reps",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Dumbbells-dumbbell-incline-bench-press-front.mp4",
        },
        {
          name: "Band Bicep Curls",
          equipment: "Medium Resistance Band Cord",
          cue: "Exhale as you squeeze your biceps and curl your hands upward. Inhale as you fully extend your arms back to your sides.",
          reps: "3 x 10-12 reps",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Dumbbells-dumbbell-curl-front.mp4",
        },
        {
          name: "Seated Tricep Extension",
          equipment: "5 lb Weight + Bench",
          cue: "Exhale as you drive the weight overhead, locking out your elbows safely. Inhale as you dip the weight back down behind your neck.",
          reps: "3 x 10-12 reps",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Dumbbells-dumbbell-seated-overhead-tricep-extension-side.mp4",
        },
        {
          name: "Goblet Squat",
          equipment: "5 lb Weight",
          cue: "Inhale deeply as you sink down into the squat like sitting in a chair. Exhale forcefully as you drive through your heels to stand back up straight.",
          reps: "3 x 10-12 reps",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-dumbbell-goblet-squat-side.mp4",
        },
        {
          name: "Band Lateral Walks",
          equipment: "Light or Medium Band Cord",
          cue: "Breathe continuously and smoothly. Maintain a soft bend in your knees and keep your core zipped up tight as you step out wide.",
          reps: "3 x 10 steps each way",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Bands-resistance-band-lateral-walk-front.mp4",
        },
        {
          name: "Dumbbell Glute Bridge",
          equipment: "5 lb Weight",
          cue: "Exhale as you drive your hips straight up toward the ceiling, squeezing your glutes tightly at the apex. Inhale as you touch your back down to the floor.",
          reps: "3 x 12 reps",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Dumbbells-dumbbell-glute-bridge-front.mp4",
        },
        {
          name: "Seated Band Rotations",
          equipment: "Anchored Resistance Band Cord",
          cue: "Exhale as you rotate your torso away from the anchor point, using your waist muscles. Inhale as you control the rotation back to center.",
          reps: "3 x 12 reps each side",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-Bands-resistance-band-horizontal-pallof-press-front.mp4",
        },
        {
          name: "Floor Elbow Plank",
          equipment: "Floor Mat / Comfortable Surface",
          cue: "Maintain steady, rhythmic breathing through your nose. Keep your elbows stacked directly beneath your shoulders, tuck your tailbone slightly to engage your lower abs, and drive back through your heels to form a straight line from head to toe.",
          reps: "45 to 60 seconds",
          videoUrl:
            "https://media.musclewiki.com/media/uploads/videos/branded/male-bodyweight-forearm-plank-side.mp4",
        },
      ];

      let currentIndex = 0;
      let state = Array(exercises.length)
        .fill()
        .map(() => [false, false, false]);

      function renderExercise() {
        const ex = exercises[currentIndex];
        document.getElementById("exercise-name").innerText = ex.name;
        document.getElementById("exercise-eq").innerText = ex.equipment;
        document.getElementById("exercise-cue").innerText = ex.cue;
        document.getElementById("sets-header").innerText =
          `Today's Sets (${ex.reps})`;
        document.getElementById("exercise-index").innerText =
          `${currentIndex + 1} / ${exercises.length}`;

        // Safely updates the video source dynamically
        const videoElement = document.getElementById("exercise-video");
        if (ex.videoUrl) {
          videoElement.src = ex.videoUrl;
          videoElement.load(); // Forces the element to clear cache and reload the stream
          videoElement
            .play()
            .catch((e) => console.log("Autoplay blocked or loading"));
        }

        // Restore checkbox states
        for (let i = 0; i < 3; i++) {
          updateSetUI(i, state[currentIndex][i]);
        }
      }

      function toggleSet(setIndex) {
        state[currentIndex][setIndex] = !state[currentIndex][setIndex];
        updateSetUI(setIndex, state[currentIndex][setIndex]);
      }

      function updateSetUI(index, isDone) {
        const btn = document.getElementById(`set-${index}`);
        const check = document.getElementById(`check-${index}`);
        if (isDone) {
          btn.classList.remove("border-gray-200", "bg-white", "text-gray-500");
          btn.classList.add(
            "border-green-500",
            "bg-green-50",
            "text-green-700",
          );
          check.innerText = "✅";
        } else {
          btn.classList.remove(
            "border-green-500",
            "bg-green-50",
            "text-green-700",
          );
          btn.classList.add("border-gray-200", "bg-white", "text-gray-500");
          check.innerText = "⬜";
        }
      }

      function nextExercise() {
        if (currentIndex < exercises.length - 1) {
          currentIndex++;
          renderExercise();
        }
      }

      // Day selector click logic
      function toggleDay(clickedButton) {
        document.querySelectorAll(".day-tracker-btn").forEach((btn) => {
          btn.classList.remove("bg-blue-600", "text-white", "shadow-md");
          btn.classList.add("bg-gray-100", "text-gray-700");
        });
        clickedButton.classList.remove("bg-gray-100", "text-gray-700");
        clickedButton.classList.add("bg-blue-600", "text-white", "shadow-md");
      }

      function prevExercise() {
        if (currentIndex > 0) {
          currentIndex--;
          renderExercise();
        }
      }

      // Initial load execution
      renderExercise();
    </script>
  </body>
</html>
